<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Entry</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .main-container {
            width: 100%;
            max-width: 600px;
            padding: 0 20px;
        }
        .card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.04);
            text-align: left;
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.025em;
            margin-top: 0;
            margin-bottom: 24px;
            color: #0f172a;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .input-control {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit;
        }
        .input-control:focus {
            border-color: #4f46e5;
            outline: none;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }
        .btn-primary {
            background: #4f46e5;
            color: white;
            flex: 2;
        }
        .btn-primary:hover {
            background: #4338ca;
        }
        .btn-secondary {
            background: #e2e8f0;
            color: #0f172a;
            flex: 1;
        }
        .btn-secondary:hover {
            background: #cbd5e1;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="card">
            <h1>Modify Deployment ✏️</h1>
            <form method="POST" action="">
                {% csrf_token %} 
                <div class="form-group">
                    <label>Project Title</label>
                    <input type="text" name="title" value="{{ project.title }}" required class="input-control">
                </div>
                <div class="form-group">
                    <label>Documentation / Description</label>
                    <textarea name="description" rows="5" required class="input-control">{{ project.description }}</textarea>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
