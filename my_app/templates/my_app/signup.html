<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 360px; box-shadow: 0 4px 25px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; text-align: center; }
        h2 { margin-bottom: 24px; font-weight: 800; font-size: 26px; color: #0f172a; }
        .btn-auth { background: #10b981; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; font-size: 15px; margin-top: 10px; }
        .btn-auth:hover { background: #059669; }
        p { margin-top: 24px; color: #64748b; font-size: 14px; }
        a { color: #10b981; text-decoration: none; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 10px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 15px; }
        input:focus { border-color: #10b981; outline: none; }
        .helptext { display: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h2>Get Started 🚀</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-auth">Register</button>
        </form>
        <p>Already registered? <a href="{% url 'login' %}">Log In</a></p>
    </div>
</body>
</html>
